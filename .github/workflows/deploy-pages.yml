name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/daily-bet.yml'
  # Le bot quotidien commit avec "[skip ci]", ce qui empêche ce workflow de se
  # redéclencher tout seul. On se raccroche donc aussi à la fin du workflow
  # "Analyse Quinté quotidienne" pour redéployer après chaque nouvelle grille.
  workflow_run:
    workflows: ["Analyse Quinté quotidienne"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Toujours construire la pointe de main (les données fraîches poussées par le bot).
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
